<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f2fe"/><stop offset="100%" stop-color="#bae6fd"/></linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1f7a8c"/><stop offset="100%" stop-color="#15616d"/></linearGradient>
  </defs>
  <rect width="600" height="400" rx="0" fill="url(#bg)"/>
  <!-- Track/ground -->
  <ellipse cx="300" cy="340" rx="260" ry="30" fill="#bae6fd" opacity=".5"/>
  <!-- Runner figure -->
  <g transform="translate(220,80)">
    <!-- Head -->
    <circle cx="80" cy="30" r="22" fill="url(#skin)"/>
    <!-- Body -->
    <path d="M80 52 L80 140" stroke="url(#skin)" stroke-width="10" stroke-linecap="round"/>
    <!-- Arms running pose -->
    <path d="M80 75 L45 55" stroke="url(#skin)" stroke-width="8" stroke-linecap="round"/>
    <path d="M80 75 L120 100" stroke="url(#skin)" stroke-width="8" stroke-linecap="round"/>
    <!-- Legs running stride -->
    <path d="M80 140 L40 200 L30 240" stroke="url(#skin)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M80 140 L130 190 L155 240" stroke="url(#skin)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Knee highlight circles -->
    <circle cx="40" cy="200" r="8" fill="none" stroke="#7dd3c0" stroke-width="3" stroke-dasharray="4 3"/>
    <circle cx="130" cy="190" r="8" fill="none" stroke="#7dd3c0" stroke-width="3" stroke-dasharray="4 3"/>
    <!-- Motion lines -->
    <path d="M140 40 L170 35" stroke="#7dd3c0" stroke-width="3" stroke-linecap="round" opacity=".6"/>
    <path d="M145 55 L172 55" stroke="#7dd3c0" stroke-width="3" stroke-linecap="round" opacity=".5"/>
    <path d="M140 70 L165 75" stroke="#7dd3c0" stroke-width="3" stroke-linecap="round" opacity=".4"/>
  </g>
  <!-- Warm-up wave indicators -->
  <g opacity=".3">
    <circle cx="150" cy="180" r="30" fill="none" stroke="#0d3b4f" stroke-width="2"/>
    <circle cx="150" cy="180" r="45" fill="none" stroke="#0d3b4f" stroke-width="1.5"/>
    <circle cx="150" cy="180" r="60" fill="none" stroke="#0d3b4f" stroke-width="1"/>
  </g>
  <!-- Heart rate line -->
  <path d="M60 360 L120 360 L140 340 L155 380 L170 350 L185 365 L200 360 L540 360" stroke="#1f7a8c" stroke-width="2.5" fill="none" opacity=".4"/>
</svg>
