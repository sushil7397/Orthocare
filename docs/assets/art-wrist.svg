<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fce7f3"/><stop offset="100%" stop-color="#fbcfe8"/></linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1f7a8c"/><stop offset="100%" stop-color="#15616d"/></linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg4)"/>
  <!-- Left hand - stretching -->
  <g transform="translate(100,80)">
    <!-- Forearm -->
    <rect x="20" y="130" width="60" height="180" rx="20" fill="url(#hand)" opacity=".85"/>
    <!-- Wrist area -->
    <ellipse cx="50" cy="130" rx="35" ry="20" fill="url(#hand)"/>
    <!-- Palm -->
    <ellipse cx="50" cy="85" rx="40" ry="48" fill="url(#hand)"/>
    <!-- Fingers -->
    <rect x="15" y="20" width="14" height="55" rx="7" fill="url(#hand)"/>
    <rect x="33" y="5" width="14" height="65" rx="7" fill="url(#hand)"/>
    <rect x="51" y="2" width="14" height="68" rx="7" fill="url(#hand)"/>
    <rect x="69" y="10" width="14" height="60" rx="7" fill="url(#hand)"/>
    <!-- Wrist joint highlight -->
    <ellipse cx="50" cy="130" rx="30" ry="8" fill="none" stroke="#7dd3c0" stroke-width="2.5" stroke-dasharray="5 3"/>
    <!-- Stretch arrows -->
    <path d="M50 0 L50 -20" stroke="#e11d48" stroke-width="2.5" marker-end="none" opacity=".5"/>
    <path d="M45 -15 L50 -25 L55 -15" fill="none" stroke="#e11d48" stroke-width="2" opacity=".5"/>
  </g>
  <!-- Right hand - keyboard position -->
  <g transform="translate(320,100)">
    <!-- Keyboard base -->
    <rect x="0" y="200" width="220" height="60" rx="10" fill="#0d3b4f" opacity=".15"/>
    <!-- Keys -->
    <g opacity=".25">
      <rect x="15" y="210" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="45" y="210" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="75" y="210" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="105" y="210" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="135" y="210" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="165" y="210" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="25" y="235" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="55" y="235" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="85" y="235" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="115" y="235" width="24" height="18" rx="3" fill="#0d3b4f"/>
      <rect x="145" y="235" width="24" height="18" rx="3" fill="#0d3b4f"/>
    </g>
    <!-- Hand on keyboard -->
    <ellipse cx="110" cy="185" rx="45" ry="25" fill="url(#hand)" opacity=".8"/>
    <!-- Fingers on keys -->
    <rect x="70" y="175" width="10" height="30" rx="5" fill="url(#hand)" opacity=".7"/>
    <rect x="85" y="170" width="10" height="33" rx="5" fill="url(#hand)" opacity=".7"/>
    <rect x="100" y="168" width="10" height="35" rx="5" fill="url(#hand)" opacity=".7"/>
    <rect x="115" y="170" width="10" height="33" rx="5" fill="url(#hand)" opacity=".7"/>
    <rect x="130" y="175" width="10" height="28" rx="5" fill="url(#hand)" opacity=".7"/>
    <!-- Neutral position line -->
    <path d="M60 195 L170 195" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 3" opacity=".5"/>
    <text x="175" y="199" fill="#16a34a" font-size="11" font-family="system-ui" opacity=".6">Neutral</text>
  </g>
  <!-- Circular motion arrows around wrist -->
  <g transform="translate(150,210)" opacity=".4">
    <path d="M-25 0 A 25 25 0 1 1 0 -25" fill="none" stroke="#15616d" stroke-width="2"/>
    <path d="M-3 -20 L0 -28 L5 -20" fill="none" stroke="#15616d" stroke-width="2"/>
  </g>
</svg>
