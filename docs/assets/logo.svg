<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3b4f"/>
      <stop offset="100%" style="stop-color:#1f7a8c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15a37a"/>
      <stop offset="100%" style="stop-color:#1f7a8c"/>
    </linearGradient>
  </defs>
  <!-- Outer circle arc (teal/green) -->
  <path d="M 40,160 A 85,85 0 0 1 55,40" fill="none" stroke="url(#g2)" stroke-width="16" stroke-linecap="round"/>
  <!-- Inner circle arc (dark blue) -->
  <path d="M 50,155 A 75,75 0 0 0 145,55" fill="none" stroke="url(#g1)" stroke-width="14" stroke-linecap="round"/>
  <!-- Knee joint - femur -->
  <ellipse cx="100" cy="78" rx="22" ry="30" fill="url(#g1)" opacity="0.9"/>
  <!-- Knee joint - tibia -->
  <ellipse cx="100" cy="128" rx="18" ry="28" fill="url(#g2)" opacity="0.9"/>
  <!-- Joint gap highlight -->
  <ellipse cx="100" cy="103" rx="16" ry="6" fill="#fff" opacity="0.9"/>
  <!-- Bone highlight -->
  <ellipse cx="93" cy="75" rx="6" ry="12" fill="#fff" opacity="0.25"/>
  <ellipse cx="94" cy="125" rx="5" ry="10" fill="#fff" opacity="0.2"/>
  <!-- Medical cross shield -->
  <g transform="translate(140,38)">
    <path d="M 0,-20 L 15,-12 L 15,8 L 0,18 L -15,8 L -15,-12 Z" fill="url(#g1)" stroke="#fff" stroke-width="2"/>
    <rect x="-3" y="-10" width="6" height="20" rx="1.5" fill="#fff"/>
    <rect x="-10" y="-3" width="20" height="6" rx="1.5" fill="#fff"/>
  </g>
  <!-- Hand curve (caring hand below) -->
  <path d="M 65,155 Q 100,180 140,150" fill="none" stroke="url(#g1)" stroke-width="8" stroke-linecap="round"/>
</svg>
