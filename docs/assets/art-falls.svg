<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ddd6fe"/></linearGradient>
    <linearGradient id="body5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1f7a8c"/><stop offset="100%" stop-color="#0d3b4f"/></linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg5)"/>
  <!-- Floor -->
  <rect x="50" y="345" width="500" height="4" rx="2" fill="#15616d" opacity=".15"/>
  <!-- Person doing balance exercise -->
  <g transform="translate(200,50)">
    <!-- Head -->
    <circle cx="60" cy="30" r="20" fill="url(#body5)"/>
    <!-- Body -->
    <path d="M60 50 L60 150" stroke="url(#body5)" stroke-width="9" stroke-linecap="round"/>
    <!-- Arms out for balance -->
    <path d="M60 85 L10 70" stroke="url(#body5)" stroke-width="7" stroke-linecap="round"/>
    <path d="M60 85 L115 70" stroke="url(#body5)" stroke-width="7" stroke-linecap="round"/>
    <!-- Standing leg -->
    <path d="M60 150 L60 250 L55 290" stroke="url(#body5)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Raised leg -->
    <path d="M60 150 L110 170 L140 165" stroke="url(#body5)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Balance circles -->
    <circle cx="55" cy="295" r="12" fill="none" stroke="#7dd3c0" stroke-width="2" opacity=".5"/>
    <circle cx="55" cy="295" r="22" fill="none" stroke="#7dd3c0" stroke-width="1.5" opacity=".3"/>
    <circle cx="55" cy="295" r="32" fill="none" stroke="#7dd3c0" stroke-width="1" opacity=".2"/>
  </g>
  <!-- Safety items -->
  <!-- Grab bar -->
  <g transform="translate(420,120)" opacity=".5">
    <rect x="0" y="0" width="8" height="120" rx="4" fill="#15616d"/>
    <circle cx="4" cy="10" r="8" fill="none" stroke="#15616d" stroke-width="2"/>
    <circle cx="4" cy="110" r="8" fill="none" stroke="#15616d" stroke-width="2"/>
    <text x="20" y="65" fill="#0d3b4f" font-size="11" font-family="system-ui">Grab bar</text>
  </g>
  <!-- Non-slip mat icon -->
  <g transform="translate(420,270)" opacity=".5">
    <rect x="0" y="0" width="60" height="8" rx="2" fill="#15616d"/>
    <path d="M0 4 Q15 -4 30 4 Q45 12 60 4" stroke="#7dd3c0" stroke-width="1.5" fill="none"/>
    <text x="0" y="25" fill="#0d3b4f" font-size="11" font-family="system-ui">Non-slip mat</text>
  </g>
  <!-- Shield/protection icon -->
  <g transform="translate(80,150)" opacity=".35">
    <path d="M30 0 L55 10 L55 35 C55 55 30 70 30 70 C30 70 5 55 5 35 L5 10 Z" fill="none" stroke="#15616d" stroke-width="2.5"/>
    <path d="M20 35 L27 42 L42 27" fill="none" stroke="#16a34a" stroke-width="3"/>
  </g>
</svg>
