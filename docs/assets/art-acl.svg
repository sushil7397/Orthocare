<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#fde68a"/></linearGradient>
    <linearGradient id="bone7" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1f7a8c"/><stop offset="100%" stop-color="#15616d"/></linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg7)"/>
  <!-- Knee joint close-up -->
  <g transform="translate(140,20)">
    <!-- Femur (upper bone) -->
    <rect x="60" y="0" width="60" height="140" rx="20" fill="url(#bone7)" opacity=".75"/>
    <ellipse cx="90" cy="150" rx="50" ry="35" fill="url(#bone7)" opacity=".8"/>
    <!-- Tibia (lower bone) -->
    <ellipse cx="90" cy="220" rx="45" ry="30" fill="url(#bone7)" opacity=".8"/>
    <rect x="65" y="230" width="50" height="150" rx="18" fill="url(#bone7)" opacity=".75"/>
    <!-- Joint space -->
    <ellipse cx="90" cy="185" rx="40" ry="15" fill="#fef3c7" stroke="#7dd3c0" stroke-width="2"/>
    <!-- ACL ligament (crossed) -->
    <path d="M70 160 L110 210" stroke="#b91c1c" stroke-width="4" stroke-linecap="round" opacity=".7"/>
    <path d="M110 160 L70 210" stroke="#16a34a" stroke-width="4" stroke-linecap="round" opacity=".5"/>
    <!-- Brace indicator -->
    <rect x="30" y="130" width="120" height="110" rx="10" fill="none" stroke="#0d3b4f" stroke-width="2" stroke-dasharray="8 5" opacity=".3"/>
    <!-- Ice pack -->
    <g transform="translate(160,150)" opacity=".5">
      <rect x="0" y="0" width="50" height="40" rx="8" fill="#bae6fd" stroke="#0369a1" stroke-width="1.5"/>
      <text x="8" y="18" fill="#0369a1" font-size="10" font-weight="600" font-family="system-ui">ICE</text>
      <text x="5" y="32" fill="#0369a1" font-size="8" font-family="system-ui">20 min</text>
    </g>
  </g>
  <!-- Week 1 timeline -->
  <g transform="translate(350,60)">
    <text x="0" y="0" fill="#0d3b4f" font-size="16" font-weight="700" font-family="system-ui" opacity=".6">Week 1 Checklist</text>
    <g opacity=".5">
      <!-- Crutches icon -->
      <circle cx="15" cy="40" r="10" fill="#dcfce7"/><path d="M11 40 L14 43 L20 37" stroke="#16a34a" stroke-width="2" fill="none"/>
      <text x="32" y="44" fill="#0d3b4f" font-size="12" font-family="system-ui">Use crutches</text>
      <!-- Ice -->
      <circle cx="15" cy="75" r="10" fill="#dcfce7"/><path d="M11 75 L14 78 L20 72" stroke="#16a34a" stroke-width="2" fill="none"/>
      <text x="32" y="79" fill="#0d3b4f" font-size="12" font-family="system-ui">Ice every 2 hours</text>
      <!-- Brace -->
      <circle cx="15" cy="110" r="10" fill="#dcfce7"/><path d="M11 110 L14 113 L20 107" stroke="#16a34a" stroke-width="2" fill="none"/>
      <text x="32" y="114" fill="#0d3b4f" font-size="12" font-family="system-ui">Wear brace</text>
      <!-- Ankle pumps -->
      <circle cx="15" cy="145" r="10" fill="#dcfce7"/><path d="M11 145 L14 148 L20 142" stroke="#16a34a" stroke-width="2" fill="none"/>
      <text x="32" y="149" fill="#0d3b4f" font-size="12" font-family="system-ui">Ankle pumps 3x15</text>
      <!-- No driving -->
      <circle cx="15" cy="180" r="10" fill="#fde8e8"/><path d="M10 175 L20 185 M20 175 L10 185" stroke="#b91c1c" stroke-width="2"/>
      <text x="32" y="184" fill="#0d3b4f" font-size="12" font-family="system-ui">No driving</text>
      <!-- Elevation -->
      <circle cx="15" cy="215" r="10" fill="#dcfce7"/><path d="M11 215 L14 218 L20 212" stroke="#16a34a" stroke-width="2" fill="none"/>
      <text x="32" y="219" fill="#0d3b4f" font-size="12" font-family="system-ui">Elevate leg</text>
    </g>
  </g>
  <!-- Recovery timeline bar -->
  <g transform="translate(50,370)">
    <rect x="0" y="0" width="500" height="6" rx="3" fill="#e3e9f1"/>
    <rect x="0" y="0" width="40" height="6" rx="3" fill="url(#bone7)"/>
    <text x="0" y="-6" fill="#0d3b4f" font-size="10" font-family="system-ui" opacity=".4">Week 1</text>
    <text x="460" y="-6" fill="#0d3b4f" font-size="10" font-family="system-ui" opacity=".3">12 months</text>
  </g>
</svg>
