<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f2fe"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="bone6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1f7a8c"/><stop offset="100%" stop-color="#0d3b4f"/></linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg6)"/>
  <!-- Large bone illustration -->
  <g transform="translate(150,60)">
    <!-- Femur-like bone -->
    <ellipse cx="60" cy="40" rx="40" ry="35" fill="url(#bone6)" opacity=".8"/>
    <ellipse cx="40" cy="45" rx="20" ry="18" fill="url(#bone6)" opacity=".7"/>
    <rect x="38" y="45" width="44" height="200" rx="16" fill="url(#bone6)" opacity=".8"/>
    <ellipse cx="60" cy="250" rx="45" ry="38" fill="url(#bone6)" opacity=".8"/>
    <ellipse cx="40" cy="248" rx="22" ry="20" fill="url(#bone6)" opacity=".7"/>
    <!-- Bone internal structure (trabecular) -->
    <g opacity=".2" stroke="#fff" stroke-width="1">
      <path d="M50 80 L70 100 M55 100 L65 120 M48 120 L72 145 M52 150 L68 170 M50 180 L70 200"/>
      <path d="M60 90 L45 110 M65 130 L50 150 M58 160 L48 180"/>
    </g>
    <!-- Density indicator - strong -->
    <rect x="130" y="100" width="80" height="12" rx="6" fill="#e3e9f1"/>
    <rect x="130" y="100" width="65" height="12" rx="6" fill="#16a34a" opacity=".6"/>
    <text x="220" y="110" fill="#0d3b4f" font-size="11" font-family="system-ui" opacity=".5">Strong</text>
    <!-- Density indicator - moderate -->
    <rect x="130" y="130" width="80" height="12" rx="6" fill="#e3e9f1"/>
    <rect x="130" y="130" width="45" height="12" rx="6" fill="#d97706" opacity=".5"/>
    <text x="220" y="140" fill="#0d3b4f" font-size="11" font-family="system-ui" opacity=".5">Moderate</text>
    <!-- Density indicator - low -->
    <rect x="130" y="160" width="80" height="12" rx="6" fill="#e3e9f1"/>
    <rect x="130" y="160" width="25" height="12" rx="6" fill="#b91c1c" opacity=".4"/>
    <text x="220" y="170" fill="#0d3b4f" font-size="11" font-family="system-ui" opacity=".5">Low</text>
  </g>
  <!-- Nutrition icons -->
  <g transform="translate(380,80)" opacity=".45">
    <!-- Calcium / milk -->
    <rect x="0" y="0" width="40" height="55" rx="6" fill="#fff" stroke="#15616d" stroke-width="2"/>
    <rect x="5" y="30" width="30" height="20" rx="3" fill="#e0f2fe"/>
    <text x="8" y="25" fill="#15616d" font-size="10" font-weight="600" font-family="system-ui">Ca</text>
    <!-- Vitamin D / sun -->
    <circle cx="90" cy="28" r="18" fill="none" stroke="#d97706" stroke-width="2.5"/>
    <g stroke="#d97706" stroke-width="2" stroke-linecap="round">
      <path d="M90 5 L90 0"/><path d="M90 51 L90 56"/>
      <path d="M67 28 L62 28"/><path d="M113 28 L118 28"/>
      <path d="M74 12 L70 8"/><path d="M106 44 L110 48"/>
      <path d="M106 12 L110 8"/><path d="M74 44 L70 48"/>
    </g>
    <text x="82" y="32" fill="#d97706" font-size="9" font-weight="600" font-family="system-ui">Vit D</text>
  </g>
  <!-- Exercise icons -->
  <g transform="translate(380,200)" opacity=".4">
    <!-- Dumbbell -->
    <rect x="0" y="20" width="15" height="30" rx="4" fill="#15616d"/>
    <rect x="15" y="30" width="50" height="10" rx="3" fill="#15616d"/>
    <rect x="65" y="20" width="15" height="30" rx="4" fill="#15616d"/>
    <text x="0" y="70" fill="#0d3b4f" font-size="11" font-family="system-ui">Exercise</text>
  </g>
</svg>
