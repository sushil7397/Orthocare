<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="body2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#15616d"/><stop offset="100%" stop-color="#0d3b4f"/></linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>
  <!-- Floor -->
  <rect x="100" y="340" width="400" height="4" rx="2" fill="#15616d" opacity=".15"/>
  <!-- Person squatting -->
  <g transform="translate(230,40)">
    <!-- Head -->
    <circle cx="70" cy="35" r="22" fill="url(#body2)"/>
    <!-- Barbell bar -->
    <rect x="-20" y="52" width="180" height="6" rx="3" fill="#5e7088"/>
    <!-- Barbell plates left -->
    <rect x="-30" y="38" width="16" height="34" rx="4" fill="#0d3b4f"/>
    <!-- Barbell plates right -->
    <rect x="154" y="38" width="16" height="34" rx="4" fill="#0d3b4f"/>
    <!-- Body - squat position -->
    <path d="M70 58 L70 130" stroke="url(#body2)" stroke-width="10" stroke-linecap="round"/>
    <!-- Arms holding bar -->
    <path d="M70 65 L10 55" stroke="url(#body2)" stroke-width="7" stroke-linecap="round"/>
    <path d="M70 65 L130 55" stroke="url(#body2)" stroke-width="7" stroke-linecap="round"/>
    <!-- Legs - squat position -->
    <path d="M70 130 L30 180 L25 250 L30 295" stroke="url(#body2)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M70 130 L110 180 L115 250 L110 295" stroke="url(#body2)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Feet -->
    <rect x="15" y="290" width="30" height="8" rx="4" fill="url(#body2)"/>
    <rect x="95" y="290" width="30" height="8" rx="4" fill="url(#body2)"/>
    <!-- Spine alignment guide -->
    <path d="M70 35 L70 130" stroke="#7dd3c0" stroke-width="2" stroke-dasharray="6 4" opacity=".5"/>
    <!-- Knee angle arc -->
    <path d="M50 180 A 20 20 0 0 1 30 195" fill="none" stroke="#7dd3c0" stroke-width="2.5"/>
    <path d="M130 180 A 20 20 0 0 0 110 195" fill="none" stroke="#7dd3c0" stroke-width="2.5" transform="translate(-20,0)"/>
  </g>
  <!-- Form guide arrows -->
  <g opacity=".35">
    <path d="M420 100 L440 100" stroke="#0d3b4f" stroke-width="2" marker-end="url(#arr)"/>
    <text x="450" y="104" fill="#0d3b4f" font-size="12" font-family="system-ui">Chest up</text>
    <path d="M420 200 L440 200" stroke="#0d3b4f" stroke-width="2"/>
    <text x="450" y="204" fill="#0d3b4f" font-size="12" font-family="system-ui">Core braced</text>
    <path d="M420 280 L440 280" stroke="#0d3b4f" stroke-width="2"/>
    <text x="450" y="284" fill="#0d3b4f" font-size="12" font-family="system-ui">Knees out</text>
  </g>
</svg>
