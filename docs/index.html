<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="assets/logo.png" />
<title>OrthoCare — Expert Orthopedic Care & Injury Prevention</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg:#f4f7fb;--card:#fff;--ink:#13233a;--muted:#5e7088;
    --brand:#1f7a8c;--brand2:#15616d;--brand-light:#e8f4f6;
    --ok:#1b873f;--warn:#b45309;--danger:#b91c1c;--line:#e3e9f1;
    --gradient:linear-gradient(135deg,#0d3b4f 0%,#15616d 40%,#1f7a8c 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}

  /* ---- Navbar ---- */
  .navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 40px;height:68px;display:flex;align-items:center;justify-content:space-between;transition:all .35s ease}
  .navbar.transparent{background:transparent}
  .navbar.solid{background:rgba(13,59,79,.97);backdrop-filter:blur(12px);box-shadow:0 2px 24px rgba(0,0,0,.18)}
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
  .nav-logo img{height:42px;border-radius:8px}
  .nav-logo span{font-size:20px;font-weight:700;letter-spacing:.5px}
  .nav-links{display:flex;gap:6px;align-items:center}
  .nav-links a{color:rgba(255,255,255,.85);text-decoration:none;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;transition:all .2s}
  .nav-links a:hover{color:#fff;background:rgba(255,255,255,.12)}
  .nav-cta{background:rgba(255,255,255,.15)!important;border:1px solid rgba(255,255,255,.3)!important;padding:8px 22px!important;border-radius:999px!important;font-weight:600!important}
  .nav-cta:hover{background:#fff!important;color:var(--brand2)!important}
  .hamburger{display:none;background:none;border:none;color:#fff;font-size:26px;cursor:pointer}

  /* ---- Hero ---- */
  .hero{background:var(--gradient);min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-50%;right:-15%;width:900px;height:900px;background:radial-gradient(circle,rgba(125,211,192,.15) 0%,transparent 70%);border-radius:50%;animation:pulse 8s ease-in-out infinite}
  .hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(31,122,140,.2) 0%,transparent 70%);border-radius:50%;animation:pulse 10s ease-in-out infinite 2s}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:1}}
  .hero-inner{max-width:1200px;margin:0 auto;padding:120px 40px 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;z-index:1}
  .hero-text h1{font-size:50px;line-height:1.12;color:#fff;margin-bottom:20px;font-weight:800}
  .hero-text h1 em{font-style:normal;color:#7dd3c0}
  .hero-text p{font-size:18px;color:rgba(255,255,255,.78);margin-bottom:32px;max-width:500px}
  .hero-actions{display:flex;gap:14px;flex-wrap:wrap}
  .btn-primary{background:#fff;color:var(--brand2);border:none;padding:14px 34px;border-radius:999px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.12);text-decoration:none;display:inline-block}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.18)}
  .btn-outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.35);padding:12px 30px;border-radius:999px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s;text-decoration:none;display:inline-block}
  .btn-outline:hover{border-color:#fff;background:rgba(255,255,255,.1)}
  .hero-visual{display:flex;justify-content:center;align-items:center}
  .hero-card-stack{position:relative;width:380px;height:420px}
  .float-card{position:absolute;background:#fff;border-radius:18px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.12);transition:transform .5s ease,box-shadow .3s}
  .float-card:hover{box-shadow:0 25px 60px rgba(0,0,0,.18)!important}
  .fc1{top:0;left:0;width:280px;animation:floatA 6s ease-in-out infinite}
  .fc2{top:100px;right:0;width:260px;animation:floatB 7s ease-in-out infinite}
  .fc3{bottom:0;left:30px;width:300px;animation:floatC 8s ease-in-out infinite}
  @keyframes floatA{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(-3deg) translateY(-12px)}}
  @keyframes floatB{0%,100%{transform:rotate(2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-14px)}}
  @keyframes floatC{0%,100%{transform:rotate(-1deg) translateY(0)}50%{transform:rotate(-1deg) translateY(-10px)}}
  .fc-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  .fc-icon svg{width:24px;height:24px}
  .float-card h4{font-size:15px;margin-bottom:4px}
  .float-card p{font-size:13px;color:var(--muted);margin:0}
  .fc-blue{background:#e0f2fe}
  .fc-green{background:#dcfce7}
  .fc-amber{background:#fef3c7}

  /* ---- Stats ---- */
  .stats{background:#fff;padding:48px 0;border-bottom:1px solid var(--line)}
  .stats-inner{max-width:1200px;margin:0 auto;padding:0 40px;display:grid;grid-template-columns:repeat(4,1fr);gap:30px;text-align:center}
  .stat-num{font-size:38px;font-weight:800;color:var(--brand2)}
  .stat-label{font-size:14px;color:var(--muted);margin-top:4px}

  /* ---- Sections ---- */
  .section{padding:90px 40px}
  .section-inner{max-width:1200px;margin:0 auto}
  .section-title{text-align:center;margin-bottom:50px}
  .section-title h2{font-size:36px;font-weight:800;margin-bottom:10px}
  .section-title p{font-size:16px;color:var(--muted);max-width:600px;margin:0 auto}
  .accent-line{width:60px;height:4px;background:var(--gradient);border-radius:4px;margin:16px auto 0}

  /* ---- Services ---- */
  .services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .service-card{background:#fff;border-radius:18px;padding:30px;border:1px solid var(--line);transition:all .35s;cursor:default}
  .service-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.08);border-color:var(--brand)}
  .service-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .service-icon svg{width:28px;height:28px}
  .service-card h3{font-size:18px;margin-bottom:8px}
  .service-card p{font-size:14px;color:var(--muted)}

  /* ---- About ---- */
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
  .about-img{background:var(--gradient);border-radius:24px;height:420px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .about-img img{height:200px;border-radius:16px;position:relative;z-index:1;filter:drop-shadow(0 10px 30px rgba(0,0,0,.2))}
  .about-img::after{content:'';position:absolute;width:350px;height:350px;background:rgba(255,255,255,.06);border-radius:50%;top:-60px;right:-60px}
  .about-text h2{font-size:34px;font-weight:800;margin-bottom:16px}
  .about-text p{color:var(--muted);margin-bottom:16px;font-size:15px}
  .about-list{list-style:none;padding:0}
  .about-list li{padding:10px 0;font-size:15px;display:flex;align-items:center;gap:12px}
  .check-icon{width:24px;height:24px;background:var(--brand-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .check-icon svg{width:14px;height:14px}

  /* ---- Booking ---- */
  .booking-section{background:var(--gradient);position:relative;overflow:hidden}
  .booking-section::before{content:'';position:absolute;width:500px;height:500px;background:rgba(125,211,192,.08);border-radius:50%;top:-150px;right:-100px}
  .booking-inner{display:grid;grid-template-columns:1fr 1.1fr;gap:50px;align-items:center}
  .booking-left h2{font-size:34px;color:#fff;font-weight:800;margin-bottom:16px}
  .booking-left p{color:rgba(255,255,255,.75);font-size:15px;margin-bottom:24px}
  .bf{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
  .bf-icon{width:42px;height:42px;background:rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .bf-icon svg{width:20px;height:20px}
  .bf h4{color:#fff;font-size:14px;margin-bottom:2px}
  .bf p{color:rgba(255,255,255,.6);font-size:13px;margin:0}
  .booking-form{background:#fff;border-radius:20px;padding:36px;box-shadow:0 25px 60px rgba(0,0,0,.2)}
  .booking-form h3{font-size:22px;margin-bottom:4px}
  .booking-form .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;transition:border .2s,box-shadow .2s;background:#fff}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,122,140,.12)}
  .book-btn{width:100%;padding:14px;background:var(--gradient);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:4px}
  .book-btn:hover{opacity:.92;transform:translateY(-1px)}
  .book-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

  /* Success modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s}
  .modal{background:#fff;border-radius:20px;padding:40px;max-width:480px;width:100%;text-align:center;animation:slideUp .4s ease}
  .modal .success-icon{width:70px;height:70px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
  .modal .success-icon svg{width:36px;height:36px;color:var(--ok)}
  .modal h2{font-size:24px;margin-bottom:8px}
  .modal p{color:var(--muted);font-size:14px;margin-bottom:8px}
  .modal .booking-id{background:var(--brand-light);display:inline-block;padding:6px 18px;border-radius:8px;font-weight:700;color:var(--brand2);font-size:15px;margin:10px 0}
  .modal .cal-btn{display:inline-flex;align-items:center;gap:8px;background:var(--gradient);color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px;margin-top:16px;transition:opacity .2s}
  .modal .cal-btn:hover{opacity:.9}
  .modal .close-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;margin-top:14px;padding:8px 16px}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

  /* ---- Blogs ---- */
  .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .blog-card{background:#fff;border-radius:18px;overflow:hidden;border:1px solid var(--line);transition:all .35s}
  .blog-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,.08)}
  .blog-thumb{height:220px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .blog-thumb svg{width:56px;height:56px;opacity:.7}
  .blog-thumb img{width:100%;height:100%;object-fit:contain;padding:8px;transition:transform .4s ease}
  .blog-card:hover .blog-thumb img{transform:scale(1.05)}
  .blog-body{padding:22px}
  .blog-cat{font-size:11px;text-transform:uppercase;font-weight:700;color:var(--brand);letter-spacing:1px;margin-bottom:8px}
  .blog-body h3{font-size:17px;margin-bottom:8px;line-height:1.4}
  .blog-body p{font-size:13px;color:var(--muted);margin-bottom:14px}
  .blog-link{color:var(--brand2);font-size:13px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:gap .2s}
  .blog-link:hover{gap:8px}

  /* ---- Testimonials ---- */
  .testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .test-card{background:#fff;border-radius:18px;padding:28px;border:1px solid var(--line);transition:all .3s}
  .test-card:hover{box-shadow:0 10px 30px rgba(0,0,0,.06)}
  .stars{color:#f59e0b;margin-bottom:12px;display:flex;gap:2px}
  .stars svg{width:18px;height:18px}
  .test-card blockquote{font-size:14px;color:#555;line-height:1.7;margin:0 0 18px;font-style:italic}
  .test-author{display:flex;align-items:center;gap:12px}
  .test-avatar{width:42px;height:42px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;color:var(--brand2);font-weight:700;font-size:16px}
  .test-name{font-size:14px;font-weight:600}
  .test-role{font-size:12px;color:var(--muted)}

  /* ---- Article Page ---- */
  .article-page{padding-top:88px;min-height:100vh}
  .article-back{display:inline-flex;align-items:center;gap:6px;color:var(--brand2);font-size:14px;font-weight:600;text-decoration:none;margin-bottom:24px;padding:8px 16px;border-radius:8px;transition:background .2s;cursor:pointer;border:none;background:none}
  .article-back:hover{background:var(--brand-light)}
  .article-back svg{width:18px;height:18px}
  .article-hero{border-radius:20px;height:450px;display:flex;align-items:center;justify-content:center;margin-bottom:32px;position:relative;overflow:hidden}
  .article-hero svg{width:80px;height:80px;opacity:.6}
  .article-hero img{width:100%;height:100%;object-fit:contain;padding:16px}
  .article-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
  .article-meta .pill{font-size:12px;padding:4px 14px;border-radius:999px;font-weight:600}
  .pill-cat{background:var(--brand-light);color:var(--brand2)}
  .pill-region{background:#fef3c7;color:var(--warn)}
  .pill-type{background:#ede9fe;color:#7c3aed}
  .article-title{font-size:34px;font-weight:800;line-height:1.25;margin-bottom:16px}
  .article-summary{font-size:17px;color:var(--muted);line-height:1.7;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--line)}
  .article-body{max-width:760px}
  .article-body h2{font-size:22px;font-weight:700;margin:32px 0 12px;color:var(--ink);padding-top:8px}
  .article-body h3{font-size:18px;font-weight:600;margin:24px 0 8px;color:var(--brand2)}
  .article-body p{font-size:15px;line-height:1.8;color:#3a4a5c;margin-bottom:14px}
  .article-body ul,.article-body ol{margin:0 0 16px 24px;color:#3a4a5c}
  .article-body li{font-size:15px;line-height:1.8;margin-bottom:6px}
  .article-body strong{color:var(--ink)}
  .article-sidebar{position:sticky;top:90px}
  .article-layout{display:grid;grid-template-columns:1fr 300px;gap:50px;max-width:1200px;margin:0 auto;padding:0 40px 80px}
  .sidebar-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;margin-bottom:16px}
  .sidebar-card h4{font-size:15px;font-weight:700;margin-bottom:12px}
  .sidebar-link{display:block;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;color:var(--ink);text-decoration:none;cursor:pointer;transition:color .2s}
  .sidebar-link:last-child{border-bottom:none}
  .sidebar-link:hover{color:var(--brand2)}
  .cta-card{background:var(--gradient);border-radius:16px;padding:28px;color:#fff;text-align:center}
  .cta-card h4{color:#fff;font-size:17px;margin-bottom:8px}
  .cta-card p{color:rgba(255,255,255,.75);font-size:13px;margin-bottom:16px}
  .cta-card a{display:inline-block;background:#fff;color:var(--brand2);padding:10px 24px;border-radius:999px;font-weight:600;font-size:14px;text-decoration:none;transition:transform .2s}
  .cta-card a:hover{transform:translateY(-2px)}
  @media(max-width:900px){
    .article-layout{grid-template-columns:1fr;padding:0 16px 60px}
    .article-title{font-size:26px}
  }

  /* ---- Contact ---- */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
  .contact-info{display:flex;flex-direction:column;gap:22px}
  .contact-item{display:flex;gap:16px;align-items:flex-start}
  .c-icon{width:50px;height:50px;border-radius:14px;background:var(--brand-light);color:var(--brand2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .c-icon svg{width:22px;height:22px}
  .contact-item h4{font-size:15px;margin-bottom:3px}
  .contact-item p{font-size:14px;color:var(--muted);margin:0}
  .contact-form{background:#fff;border-radius:18px;padding:32px;border:1px solid var(--line);box-shadow:0 4px 15px rgba(0,0,0,.04)}
  .contact-form label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:16px}
  .contact-form label:first-child{margin-top:0}
  .contact-form input,.contact-form textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:6px;font-family:inherit;transition:border .2s}
  .contact-form input:focus,.contact-form textarea:focus{outline:none;border-color:var(--brand)}
  .contact-submit{margin-top:20px;width:100%;background:var(--gradient);color:#fff;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .contact-submit:hover{opacity:.9}

  /* ---- Footer ---- */
  .footer{background:#0d2833;color:rgba(255,255,255,.7);padding:50px 40px 30px}
  .footer-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
  .footer h4{color:#fff;margin-bottom:14px;font-size:15px}
  .footer p{font-size:13px;line-height:1.8}
  .footer a{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;display:block;padding:3px 0;transition:color .2s}
  .footer a:hover{color:#7dd3c0}
  .footer-bottom{max-width:1200px;margin:30px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);text-align:center;font-size:12px;color:rgba(255,255,255,.4)}
  .footer-logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .footer-logo img{height:36px;border-radius:6px}
  .footer-logo span{color:#fff;font-size:18px;font-weight:700}

  /* ---- How It Works ---- */
  .steps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative}
  .step{text-align:center;padding:0 20px;position:relative}
  .step-num{width:60px;height:60px;border-radius:50%;background:var(--gradient);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin:0 auto 16px;position:relative;z-index:2;box-shadow:0 6px 20px rgba(31,122,140,.3)}
  .step-line{position:absolute;top:30px;left:calc(50% + 30px);right:calc(-50% + 30px);height:3px;background:var(--line);z-index:1}
  .step:last-child .step-line{display:none}
  .step h4{font-size:16px;margin-bottom:6px}
  .step p{font-size:13px;color:var(--muted)}

  /* ---- Doctor Profile ---- */
  .doctor-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:50px;align-items:center}
  .doctor-photo{background:var(--gradient);border-radius:24px;height:420px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .doctor-photo img{height:300px;border-radius:16px;position:relative;z-index:1;filter:drop-shadow(0 10px 30px rgba(0,0,0,.2))}
  .doctor-photo::after{content:'';position:absolute;width:300px;height:300px;background:rgba(255,255,255,.06);border-radius:50%;bottom:-80px;left:-80px}
  .doctor-info h2{font-size:32px;font-weight:800;margin-bottom:6px}
  .doctor-info .doc-spec{color:var(--brand);font-size:15px;font-weight:600;margin-bottom:16px}
  .doctor-info p{color:var(--muted);font-size:15px;margin-bottom:14px;line-height:1.7}
  .doc-quals{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
  .doc-quals span{background:var(--brand-light);color:var(--brand2);padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600}
  .doc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
  .doc-stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}
  .doc-stat .ds-num{font-size:24px;font-weight:800;color:var(--brand2)}
  .doc-stat .ds-label{font-size:12px;color:var(--muted)}

  /* ---- FAQ ---- */
  .faq-list{max-width:760px;margin:0 auto}

// ---- Scroll animation hook ----
function useOnScreen(ref) {
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting) setVis(true); }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return vis;
}
function Anim({ children, className="", style={}, delay=0 }) {
  const ref = useRef();
  const vis = useOnScreen(ref);
  return <div ref={ref} className={`animate ${vis?"visible":""} ${className}`} style={{...style, transitionDelay:delay+"ms"}}>{children}</div>;
}

// =========== ANIMATED COUNTER ===========
function Counter({ end, suffix="", duration=2000 }) {
  const [count, setCount] = useState(0);
  const ref = useRef();
  const vis = useOnScreen(ref);
  const started = useRef(false);
  useEffect(() => {
    if (!vis || started.current) return;
    started.current = true;
    const num = parseInt(end.toString().replace(/[^0-9]/g,"")) || 0;
    const step = Math.ceil(num / (duration / 16));
    let cur = 0;
    const timer = setInterval(() => {
      cur += step;
      if (cur >= num) { cur = num; clearInterval(timer); }
      setCount(cur);
    }, 16);
    return () => clearInterval(timer);
  }, [vis]);
  return <span ref={ref}>{count.toLocaleString()}{suffix}</span>;
}

function BookingSection() {
  const [form, setForm] = useState({ name:"", email:"", phone:"", date:"", time:"", visitType:"in_clinic", reason:"", symptoms:"" });
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);

  useEffect(() => {
    const tmr = new Date(Date.now()+86400000).toISOString().slice(0,10);
    setForm(f=>({...f, date:tmr}));
  },[]);

  function up(k,v){ setForm(f=>({...f,[k]:v})); }

  function googleCalendarLink({title, date, time, durationMin, description, location}) {
    const start = date.replace(/-/g,"") + "T" + time.replace(/:/g,"") + "00";
    const [h,m] = time.split(":").map(Number);
    const endMin = h*60 + m + (durationMin||30);
    const eh = String(Math.floor(endMin/60)).padStart(2,"0");

const ARTICLES = [
  {id:"1",category:"sports_fitness",title:"Dynamic Warm-Up Before Running",summary:"A 5-minute routine to prep knees and hips before a run.",media_type:"video",body_region:"knee",media_url:"assets/art-warmup.svg",body:`<h2>Why Warm Up?</h2><p>Jumping straight into a run with cold muscles is one of the top causes of knee and hip injuries among recreational runners. A dynamic warm-up increases blood flow, loosens joints, and activates the stabilizer muscles that protect your knees.</p><h2>The 5-Minute Routine</h2><p>Perform each movement for 30-40 seconds with controlled form:</p><h3>1. Leg Swings (Forward &amp; Lateral)</h3><p>Hold a wall for balance. Swing one leg forward and back in a relaxed pendulum motion, then switch to side-to-side swings. This opens up the hip joint and stretches the hamstrings and adductors. Do 15 swings per direction per leg.</p><h3>2. Walking Lunges with Twist</h3><p>Step forward into a lunge, keeping your front knee behind your toes. At the bottom, rotate your torso toward the front leg. This activates your quads, glutes, hip flexors, and core simultaneously. Perform 8 per side.</p><h3>3. High Knees</h3><p>March in place, driving your knees to hip height. Keep your core tight and pump your arms. This raises your heart rate and primes the hip flexors. Continue for 30 seconds.</p><h3>4. Butt Kicks</h3><p>Jog in place, flicking your heels toward your glutes. This activates the hamstrings and improves knee flexion range. Continue for 30 seconds.</p><h3>5. Ankle Circles &amp; Calf Raises</h3><p>Circle each ankle 10 times in each direction, then do 15 slow calf raises. This prepares the Achilles tendon and ankle stabilizers for the impact of running.</p><h2>When to Do This</h2><p>Perform this routine immediately before every run — even easy recovery runs. It takes only 5 minutes but can prevent weeks of downtime from a preventable injury.</p><h2>Warning Signs</h2><p>If any movement causes sharp pain (not just stiffness), stop and consult your doctor. Persistent knee pain during warm-up may indicate an underlying issue that needs attention before you continue training.</p>`},
  {id:"2",category:"sports_fitness",title:"Safe Barbell Squat Form",summary:"Bracing and depth cues to protect your lower back.",media_type:"gif",body_region:"back",media_url:"assets/art-squat.svg",body:`<h2>The Squat: King of Exercises — If Done Right</h2><p>The barbell back squat is one of the most effective exercises for building lower body strength, but poor form is a leading cause of lower back injuries in the gym. Here's how to squat safely.</p><h2>Setting Up</h2><p><strong>Bar position:</strong> Place the bar across your upper traps (high bar) or rear delts (low bar). Never rest it on your neck bones. Grip the bar slightly wider than shoulder-width and squeeze your shoulder blades together to create a muscular shelf.</p><p><strong>Foot stance:</strong> Feet shoulder-width apart, toes pointed out 15-30 degrees. Your knees should track over your toes throughout the movement.</p><h2>The Brace</h2><p>Before every rep, take a deep belly breath and brace your core as if someone is about to punch you in the stomach. This intra-abdominal pressure creates a natural weightlifting belt that protects your spine. Hold this brace throughout the entire rep.</p><h2>The Descent</h2><p>Initiate the squat by pushing your hips back and bending your knees simultaneously. Keep your chest up and your back in a neutral position — no rounding. Descend until your hip crease drops just below your knee (parallel or slightly below).</p><h2>Common Mistakes</h2><ul><li><strong>Butt wink:</strong> If your lower back rounds at the bottom, you're going too deep for your current mobility. Work on hip and ankle flexibility.</li><li><strong>Knee cave:</strong> Knees collapsing inward puts stress on the MCL. Push your knees out over your toes.</li><li><strong>Forward lean:</strong> Excessive forward torso lean loads the lower back. Focus on keeping the bar over mid-foot.</li><li><strong>Bouncing:</strong> Never bounce out of the bottom position. Control the descent and reverse smoothly.</li></ul><h2>Recommended Progression</h2><p>Start with bodyweight squats, then progress to goblet squats, and only add the barbell when you can perform 3 sets of 15 goblet squats with perfect form. Increase barbell weight by no more than 2.5-5 kg per week.</p>`},
  {id:"3",category:"ergonomics",title:"Desk Posture Reset",summary:"Monitor height, chair, and micro-break guidance for pain-free office work.",media_type:"article",body_region:"back",media_url:"assets/art-posture.svg",body:`<h2>Why Desk Posture Matters</h2><p>The average office worker sits for 8-10 hours per day. Poor posture during this time is a primary driver of chronic back pain, neck stiffness, and shoulder tension. The good news: small adjustments can make a big difference.</p><h2>The Ideal Setup</h2><h3>Monitor Position</h3><p>The top of your screen should be at or slightly below eye level, about an arm's length away (50-70 cm). This prevents you from tilting your head up or down, which strains the neck. If you use a laptop, invest in a laptop stand and an external keyboard.</p><h3>Chair Adjustment</h3><p>Your feet should be flat on the floor with knees bent at roughly 90 degrees. The chair backrest should support your lumbar curve — if it doesn't, use a small rolled-up towel or lumbar pillow. Armrests should allow your shoulders to relax, not hunch.</p><h3>Keyboard &amp; Mouse</h3><p>Elbows should be bent at 90-100 degrees with forearms parallel to the floor. Keep your wrists in a neutral (straight) position — not bent up or down. The mouse should be right next to the keyboard so you don't have to reach.</p><h2>The 20-20-20 Rule</h2><p>Every 20 minutes, look at something 20 feet away for 20 seconds. This reduces eye strain and gives you a natural cue to check your posture.</p><h2>Micro-Break Routine (Every 45 Minutes)</h2><p>Stand up and do these for 60 seconds total:</p><ul><li><strong>Chin tucks:</strong> Pull your chin straight back (making a double chin) and hold 5 seconds. Repeat 5 times. Relieves neck tension.</li><li><strong>Shoulder rolls:</strong> Roll shoulders backward 10 times. Opens the chest and counteracts the forward-hunch position.</li><li><strong>Standing back extension:</strong> Place hands on lower back and gently arch backward. Hold 5 seconds, repeat 3 times.</li></ul><h2>When to Seek Help</h2><p>If you have persistent back or neck pain that doesn't improve with posture correction after 2 weeks, schedule a consultation. Chronic pain may indicate a disc or joint issue that benefits from professional treatment.</p>`},
  {id:"4",category:"ergonomics",title:"Wrist Care for Typists",summary:"Neutral wrist positioning and stretches to prevent carpal tunnel.",media_type:"article",body_region:"wrist",media_url:"assets/art-wrist.svg",body:`<h2>Typing and Your Wrists</h2><p>Repetitive strain injuries (RSI) like carpal tunnel syndrome and tendinitis are increasingly common among people who type for hours daily. The key to prevention is keeping your wrists in a neutral position and taking regular stretch breaks.</p><h2>Neutral Wrist Position</h2><p>Your wrists should be straight — not angled up, down, or to the side — when typing. The back of your hand should form a straight line with your forearm. If your keyboard forces your wrists upward, consider a negative-tilt keyboard tray or a split ergonomic keyboard.</p><h2>What to Avoid</h2><ul><li><strong>Wrist rests while typing:</strong> These are for resting between typing bursts, not during active typing. Pressing your wrist into a rest while typing compresses the carpal tunnel.</li><li><strong>Death grip on the mouse:</strong> Hold your mouse lightly. A tight grip fatigues the forearm muscles and increases tendon strain.</li><li><strong>Hovering wrists:</strong> If you hold your wrists elevated above the keyboard for long periods, the forearm muscles fatigue. Let them rest between sentences.</li></ul><h2>5-Minute Wrist Stretch Routine</h2><p>Do this every 1-2 hours:</p><h3>1. Prayer Stretch</h3><p>Press palms together in front of your chest, fingers pointing up. Slowly lower your hands toward your waist while keeping palms together until you feel a stretch. Hold 15 seconds.</p><h3>2. Wrist Flexor Stretch</h3><p>Extend one arm forward, palm up. Use the other hand to gently pull your fingers downward. Hold 15 seconds per hand.</p><h3>3. Wrist Extensor Stretch</h3><p>Extend one arm forward, palm down. Use the other hand to gently press your fingers toward you. Hold 15 seconds per hand.</p><h3>4. Finger Spreads</h3><p>Spread all fingers wide, hold 5 seconds, then make a tight fist. Repeat 10 times. This improves blood flow to the tendons.</p><h3>5. Wrist Circles</h3><p>Circle each wrist slowly 10 times clockwise, then 10 times counterclockwise.</p><h2>When to See a Doctor</h2><p>Tingling, numbness, or weakness in your fingers — especially the thumb, index, and middle fingers — may indicate carpal tunnel syndrome. Early treatment is much more effective than waiting.</p>`},
  {id:"5",category:"age_specific",title:"Fall Prevention for Seniors",summary:"Home hazard checklist and balance exercises for older adults.",media_type:"article",body_region:"knee",media_url:"assets/art-falls.svg",body:`<h2>Falls Are the #1 Injury Risk for Adults 65+</h2><p>One in four older adults falls each year, and falls are the leading cause of fractures, head injuries, and loss of independence. The good news: most falls are preventable with simple home modifications and regular balance training.</p><h2>Home Safety Checklist</h2><h3>Floors &amp; Walkways</h3><ul><li>Remove loose rugs or secure them with non-slip backing</li><li>Keep electrical cords out of walking paths</li><li>Clean up spills immediately</li><li>Ensure all hallways and stairways are well-lit</li></ul><h3>Bathroom (Highest Risk Area)</h3><ul><li>Install grab bars next to the toilet and inside the shower/tub</li><li>Use a non-slip bath mat inside the tub</li><li>Consider a shower chair if balance is a concern</li><li>Use a raised toilet seat if getting up from the toilet is difficult</li></ul><h3>Stairs</h3><ul><li>Install handrails on both sides</li><li>Mark the edges of steps with contrasting tape</li><li>Keep stairs clutter-free</li><li>Ensure good lighting at top and bottom</li></ul><h2>Daily Balance Exercises</h2><p>Do these near a counter or sturdy chair for support:</p><h3>1. Heel-to-Toe Walk</h3><p>Walk in a straight line placing the heel of one foot directly in front of the toes of the other. Take 20 steps.</p><h3>2. Single-Leg Stands</h3><p>Stand on one foot for 10-30 seconds, then switch. Do 3 rounds per leg.</p><h3>3. Sit-to-Stand</h3><p>From a sturdy chair, stand up without using your hands, then sit back down slowly. Do 10 repetitions.</p><h3>4. Side Leg Raises</h3><p>Hold a chair and lift one leg out to the side, hold 3 seconds, lower slowly. Do 10 per side.</p><h2>Additional Tips</h2><ul><li>Have your vision checked annually</li><li>Review medications with your doctor — some cause dizziness</li><li>Wear supportive, non-slip shoes even indoors</li><li>Stay physically active — even gentle walking helps maintain balance</li></ul>`},
  {id:"6",category:"age_specific",title:"Bone Density Optimization",summary:"Nutrition and weight-bearing exercise to keep bones strong.",media_type:"article",body_region:"back",media_url:"assets/art-bone.svg",body:`<h2>Why Bone Density Matters</h2><p>Bone density peaks around age 30 and gradually declines after that. Low bone density (osteopenia) can progress to osteoporosis, making bones fragile and fracture-prone.</p><h2>Nutrition for Strong Bones</h2><h3>Calcium</h3><p>Adults need 1,000-1,200 mg of calcium daily. Good sources include dairy products, leafy greens (kale, broccoli), sardines, almonds, and fortified foods.</p><h3>Vitamin D</h3><p>Vitamin D is essential for calcium absorption. Aim for 600-800 IU daily. Sources include sunlight exposure (15-20 minutes of midday sun), fatty fish, egg yolks, and supplements.</p><h3>Protein</h3><p>Bone is about 50% protein by volume. Aim for 1.0-1.2 g of protein per kg of body weight daily.</p><h3>What to Limit</h3><ul><li><strong>Excess sodium:</strong> High salt intake increases calcium excretion</li><li><strong>Excess caffeine:</strong> More than 3 cups of coffee per day may reduce calcium absorption</li><li><strong>Alcohol:</strong> Heavy drinking interferes with bone formation</li><li><strong>Smoking:</strong> Directly toxic to bone-forming cells</li></ul><h2>Weight-Bearing Exercise</h2><h3>High Impact (if joints allow)</h3><ul><li>Walking and hiking</li><li>Jogging</li><li>Stair climbing</li><li>Dancing</li><li>Tennis or pickleball</li></ul><h3>Resistance Training</h3><ul><li>Squats and lunges</li><li>Deadlifts (start light, focus on form)</li><li>Overhead press</li><li>Resistance bands</li></ul><p>Aim for weight-bearing or resistance exercise at least 3-4 times per week, 30 minutes per session.</p><h2>When to Get Tested</h2><p>A DEXA scan measures bone density and takes about 10 minutes. Recommended for all women over 65, men over 70, and anyone with risk factors.</p>`},
  {id:"7",category:"post_op",title:"ACL: What to Avoid in Week 1",summary:"Critical dos and don'ts for the first week after ACL reconstruction.",media_type:"article",body_region:"knee",media_url:"assets/art-acl.svg",body:`<h2>The First Week Is Critical</h2><p>ACL reconstruction surgery replaces your torn anterior cruciate ligament with a graft. The first week post-op is when the graft is most vulnerable and your knee is most swollen.</p><h2>What to AVOID</h2><h3>1. Bearing Full Weight Without Support</h3><p>Use your crutches for ALL walking, even short trips to the bathroom. Putting too much weight too soon can damage the graft.</p><h3>2. Skipping the Ice and Elevation</h3><p>Ice your knee for 20 minutes every 2 hours while awake. Keep your leg elevated above heart level as much as possible.</p><h3>3. Removing Your Brace Without Permission</h3><p>If your surgeon placed you in a knee brace, wear it as directed — usually at all times including sleep for the first 1-2 weeks.</p><h3>4. Pushing Through Pain for Range of Motion</h3><p>Gentle range of motion exercises are important, but forcing your knee to bend should never cause sharp pain.</p><h3>5. Sitting with Your Knee Bent for Long Periods</h3><p>Prolonged sitting with the knee bent can cause the knee to stiffen in a flexed position. Aim to straighten the knee fully several times per day.</p><h3>6. Driving</h3><p>Do not drive for at least 2 weeks (right knee) or until you are off pain medication.</p><h2>What to DO in Week 1</h2><ul><li><strong>Ankle pumps:</strong> 3 sets of 15, every 2 hours. Prevents blood clots.</li><li><strong>Quad sets:</strong> Tighten your thigh muscle and hold 5 seconds, 3 sets of 10.</li><li><strong>Gentle heel slides:</strong> Slide your heel toward your buttock as far as comfortable. 2 sets of 10.</li><li><strong>Take pain medication on schedule.</strong></li><li><strong>Watch for warning signs:</strong> Calf pain/swelling, fever over 101°F, excessive drainage, or increasing redness. Call your surgeon immediately.</li></ul><h2>The Big Picture</h2><p>Full ACL recovery takes 9-12 months. Week 1 is just the start, but getting it right makes everything that follows easier.</p>`},
];

        <div className="section-title"><h2>What Our Patients Say</h2><p>Real stories from people who trust OrthoCare.</p><div className="accent-line"></div></div>
        <div className="testimonials-grid">
          {reviews.map((r,i)=>(
            <Anim key={i} delay={i*120}>
              <div className="test-card">
                <div className="stars">{[0,1,2,3,4].map(j=><span key={j}>{I.star()}</span>)}</div>
                <blockquote>"{r.text}"</blockquote>
                <div className="test-author">
                  <div className="test-avatar">{r.init}</div>
                  <div><div className="test-name">{r.name}</div><div className="test-role">{r.role}</div></div>
                </div>
              </div>
            </Anim>
          ))}
        </div>
      </div>
    </section>
  );
}

// =========== CONTACT ===========
function Contact() {
  const [sent, setSent] = useState(false);
  function handle(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    fetch("https://formsubmit.co/ajax/sushily2302@gmail.com", {method:"POST",headers:{"Content-Type":"application/json","Accept":"application/json"},body:JSON.stringify(Object.fromEntries(fd))});
    setSent(true);
    e.target.reset();
    setTimeout(()=>setSent(false),5000);
  }
  return (
    <section className="section" id="contact" style={{background:"#fff"}}>
      <div className="section-inner">
        <div className="section-title"><h2>Get in Touch</h2><p>Have questions? Our team will get back to you within 24 hours.</p><div className="accent-line"></div></div>
        <div className="contact-grid">
          <Anim>
            <div className="contact-info">
              <div className="contact-item"><div className="c-icon">{I.pin()}</div><div><h4>Visit Us</h4><p>123 Orthopedic Lane, Suite 200<br/>Medical District, NY 10001</p></div></div>
              <div className="contact-item"><div className="c-icon">{I.phone()}</div><div><h4>Call Us</h4><p>+1 (555) 123-4567<br/>Mon - Fri, 8 AM - 6 PM</p></div></div>
              <div className="contact-item"><div className="c-icon">{I.mailBox()}</div><div><h4>Email Us</h4><p>hello@orthocare.example<br/>support@orthocare.example</p></div></div>
              <div className="contact-item"><div className="c-icon">{I.globe()}</div><div><h4>Working Hours</h4><p>Mon - Fri: 8 AM - 6 PM<br/>Saturday: 9 AM - 1 PM</p></div></div>
            </div>
          </Anim>
          <Anim delay={150}>
            <form className="contact-form" onSubmit={handle}>
              <label>Full Name<input name="name" required placeholder="John Doe"/></label>
              <label>Email<input name="email" type="email" required placeholder="john@example.com"/></label>
              <label>Phone<input name="phone" type="tel" placeholder="+1 (555) 000-0000"/></label>
              <label>Message<textarea name="message" rows="4" required placeholder="How can we help?"></textarea></label>
              {sent
                ? <div style={{marginTop:16,padding:12,background:"#dcfce7",borderRadius:10,color:"var(--ok)",fontSize:14,textAlign:"center"}}>Thank you! We'll get back to you shortly.</div>
                : <button type="submit" className="contact-submit">Send Message</button>}
            </form>
          </Anim>
        </div>
      </div>
    </section>
  );
}

// =========== PRELOADER ===========
function Preloader() {
  const [done, setDone] = useState(false);
  useEffect(() => { setTimeout(() => setDone(true), 1800); }, []);
  return (
    <div className={`preloader ${done?"done":""}`}>
      <img src="assets/logo.png" alt="OrthoCare"/>
      <span>Loading OrthoCare...</span>
    </div>
  );
}

// =========== APP ===========
function App() {
  const [articleId, setArticleId] = useState(null);

  if (articleId) {
    return (<><ArticlePage articleId={articleId} onNavigate={(id)=>setArticleId(id)} onBack={()=>{setArticleId(null); setTimeout(()=>{const el=document.getElementById("blogs");if(el)el.scrollIntoView({behavior:"smooth"});},100);}} /><ScrollTop/></>);
  }

  return (
    <>
      <Preloader/>
      <Navbar/>
      <Hero/>
      <Stats/>
      <HowItWorks/>
      <Services/>
      <About/>
      <DoctorProfile/>
      <BookingSection/>
      <Blogs onRead={(id)=>setArticleId(id)}/>
      <Testimonials/>
      <FAQ/>
      <Contact/>
      <Footer/>
      <ScrollTop/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
